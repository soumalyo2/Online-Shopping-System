<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details | PBSSD Fresh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #FAFAF7;
            --primary-nature: #5A8A5A;
            --headline-color: #1A1A1A;
            --text-muted: #6C757D;
            --border-soft: #E5E5E0;
            --body-font: 'DM Sans', sans-serif;
            --heading-font: 'Lora', serif;
        }
        body { background-color: var(--bg-color); font-family: var(--body-font); color: var(--headline-color); padding-top: 100px; }
        .navbar { background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border-soft); }
        .navbar-brand { color: var(--primary-nature) !important; font-family: var(--heading-font); font-weight: 700; }
        .swiper { width: 100%; height: 100%; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.05); }
        .swiper-slide img { width: 100%; height: auto; object-fit: cover; }
        .thumbs-swiper { margin-top: 15px; }
        .thumbs-swiper .swiper-slide { opacity: 0.5; cursor: pointer; border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: 0.3s; }
        .thumbs-swiper .swiper-slide-thumb-active { opacity: 1; border-color: var(--primary-nature); }
        .price-tag { font-size: 2.5rem; color: var(--primary-nature); font-weight: 700; }
        .btn-nature { background: var(--primary-nature); color: white; border-radius: 12px; font-weight: 600; border: none; padding: 15px 30px; transition: all 0.3s; }
        .btn-nature:hover { filter: brightness(0.9); transform: translateY(-2px); box-shadow: 0 8px 15px rgba(90, 138, 90, 0.2); color: white; }
        .info-card { background: white; border-radius: 20px; border: 1px solid var(--border-soft); padding: 24px; margin-top: 30px; }
        .delivery-item { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .delivery-item i { color: var(--primary-nature); font-size: 1.5rem; }
        .breadcrumb-item a { color: var(--text-muted); text-decoration: none; }
        .breadcrumb-item.active { color: var(--primary-nature); font-weight: 600; }
        .quantity-control { width: 140px; padding: 10px 20px; border-radius: 12px; border: 2px solid var(--border-soft); }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand fs-3" href="index.html">PBSSD FRESH</a>
            <div class="ms-auto d-flex align-items-center">
                <a href="visual/template/cart.html" class="nav-link position-relative me-3">
                    <i class="bi bi-bag fs-4"></i>
                    <span id="cart-badge" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">0</span>
                </a>
                <a href="index.html" class="btn btn-outline-dark btn-sm rounded-pill px-3">Store</a>
            </div>
        </div>
    </nav>

    <div class="container pb-5">
        <nav aria-label="breadcrumb" class="mb-4">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="index.html">Home</a></li>
                <li class="breadcrumb-item active" id="breadcrumb-product" aria-current="page">Product</li>
            </ol>
        </nav>
        
        <a href="index.html" class="btn btn-outline-secondary mb-4 rounded-pill px-4 shadow-sm"><i class="bi bi-arrow-left"></i> Back to Shop</a>
        
        <div class="row g-5" id="product-content">
            <!-- Content will be injected by JavaScript -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p>Loading product details...</p>
            </div>
        </div>
    </div>

    <!-- Login Required Modal -->
    <div class="modal fade" id="userLoginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-body p-5 text-center">
                    <i class="bi bi-person-circle display-4 text-success mb-3"></i>
                    <h3 class="fw-bold">Login Required</h3>
                    <p class="text-secondary">Please sign in to continue with your purchase.</p>
                    <a href="visual/template/login.html" class="btn btn-nature w-100 py-3 mt-3">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="visual/js/products.js"></script>
    <script>
        let cartDB;
        const cartRequest = indexedDB.open('PBSSDCartDB', 1);
        
        cartRequest.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains('cart_state')) {
                db.createObjectStore('cart_state');
            }
        };

        cartRequest.onsuccess = (e) => {
            cartDB = e.target.result;
            refreshCartBadge();
        };

        function refreshCartBadge() {
            if (!cartDB) return;
            try {
                const tx = cartDB.transaction(['cart_state'], 'readonly');
                const store = tx.objectStore('cart_state');
                const getReq = store.get('count');
                getReq.onsuccess = () => {
                    document.getElementById('cart-badge').innerText = getReq.result || 0;
                };
            } catch (err) {
                console.warn("Cart store not ready yet:", err);
                document.getElementById('cart-badge').innerText = 0;
            };
        }

        function handleAddToCart(qty = 1, silent = false) {
            if (!localStorage.getItem('pbssd_user')) {
                new bootstrap.Modal(document.getElementById('userLoginModal')).show();
                return false;
            }

            if (cartDB) {
                const tx = cartDB.transaction(['cart_state'], 'readwrite');
                const store = tx.objectStore('cart_state');
                const getReq = store.get('count');
                getReq.onsuccess = () => {
                    let count = getReq.result || 0;
                    count += parseInt(qty);
                    store.put(count, 'count');
                    refreshCartBadge();
                };
            }

            if (!silent) {
                Swal.fire({
                    title: 'Added to Bag!',
                    text: 'Your fresh pick is ready for checkout.',
                    icon: 'success',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 3000
                });
            }
            return true;
        }

        function handleBuyNow() {
            const qty = document.getElementById('quantity-input')?.value || 1;
            if (handleAddToCart(qty, true)) {
                window.location.href = 'visual/template/cart.html';
            }
        }

        window.addEventListener('load', () => {
            // 1. Get the ID from the URL (e.g., ?id=5)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            // 2. Find the product in our array
            if (typeof products === 'undefined') {
                console.error("Products array not found. Ensure products.js is loaded correctly.");
                return;
            }
            const product = products.find(p => p.id === productId);

            const container = document.getElementById('product-content');

            if (product) {
                document.getElementById('breadcrumb-product').innerText = product.name;
                // 3. Update the HTML with product data
                container.innerHTML = `
                    <div class="col-md-6">
                        <div class="swiper main-swiper">
                            <div class="swiper-wrapper">
                                ${product.images.map(img => `<div class="swiper-slide"><img src="${img}" alt="${product.name}"></div>`).join('')}
                            </div>
                            <div class="swiper-button-next text-success"></div>
                            <div class="swiper-button-prev text-success"></div>
                        </div>
                        <div class="swiper thumbs-swiper">
                            <div class="swiper-wrapper">
                                ${product.images.map(img => `<div class="swiper-slide"><img src="${img}" alt="thumbnail"></div>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <span class="badge bg-success mb-2">${product.section}</span>
                        <h1 class="display-4 fw-bold mb-3 heading-lora">${product.name}</h1>
                        <div class="mb-3 text-warning">
                            ${'<i class="bi bi-star-fill"></i>'.repeat(product.rating)}
                            ${'<i class="bi bi-star"></i>'.repeat(5 - product.rating)}
                            <span class="text-muted ms-2 small">(${Math.floor(Math.random() * 200) + 50} Reviews)</span>
                        </div>
                        <p class="price-tag mb-4">${product.price}</p>
                        <p class="text-secondary mb-4" style="line-height: 1.8; font-size: 1.1rem;">${product.description}</p>
                        
                        <div class="mb-5">
                            <label class="form-label small fw-bold text-uppercase tracking-wider">Quantity</label>
                            <select class="form-select quantity-control" id="quantity-input">
                                <option value="1">1 Unit</option>
                                <option value="2">2 Units</option>
                                <option value="5">5 Units</option>
                                <option value="10">10 Units</option>
                            </select>
                        </div>
                        
                        <div class="d-flex gap-3 mt-5">
                            <button onclick="handleAddToCart(document.getElementById('quantity-input').value)" class="btn btn-outline-dark btn-lg flex-grow-1 rounded-pill"><i class="bi bi-bag-plus me-2"></i>Add to Cart</button>
                            <button onclick="handleBuyNow()" class="btn btn-nature btn-lg flex-grow-1 rounded-pill">Buy It Now</button>
                        </div>
                    </div>
                `;
                document.title = `${product.name} | PBSSD Fresh`;

                // Initialize Swiper after content injection
                const thumbsSwiper = new Swiper(".thumbs-swiper", {
                    spaceBetween: 10,
                    slidesPerView: 5,
                    freeMode: true,
                    watchSlidesProgress: true,
                });
                new Swiper(".main-swiper", {
                    spaceBetween: 10,
                    navigation: { nextEl: ".swiper-button-next", prevEl: ".swiper-button-prev" },
                    thumbs: { swiper: thumbsSwiper },
                });

            } else {
                container.innerHTML = `<div class="col-12 text-center"><h2>Product not found</h2><a href="index.html">Return to home</a></div>`;
            }
        });
    </script>
</body>
</html>
