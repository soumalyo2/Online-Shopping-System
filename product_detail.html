<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Details | PBSSD Fresh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background-color: #FAFAF7; padding-top: 50px; }
        .product-img { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; }
        .price-tag { font-size: 2rem; color: #5A8A5A; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="btn btn-outline-secondary mb-4"><i class="bi bi-arrow-left"></i> Back to Shop</a>
        
        <div class="row g-5" id="product-content">
            <!-- Content will be injected by JavaScript -->
            <div class="col-12 text-center py-5">
                <div class="spinner-border text-success" role="status"></div>
                <p>Loading product details...</p>
            </div>
        </div>
    </div>

    <script src="visual/js/products.js"></script>
    <script>
        window.addEventListener('load', () => {
            // 1. Get the ID from the URL (e.g., ?id=5)
            const urlParams = new URLSearchParams(window.location.search);
            const productId = parseInt(urlParams.get('id'));

            // 2. Find the product in our array
            const product = products.find(p => p.id === productId);

            const container = document.getElementById('product-content');

            if (product) {
                // 3. Update the HTML with product data
                container.innerHTML = `
                    <div class="col-md-6">
                        <img src="${product.image}" class="product-img" alt="${product.name}">
                    </div>
                    <div class="col-md-6">
                        <span class="badge bg-success mb-2">${product.section}</span>
                        <h1 class="display-4 fw-bold mb-3">${product.name}</h1>
                        <div class="mb-3 text-warning">
                            ${'<i class="bi bi-star-fill"></i>'.repeat(product.rating)}
                            ${'<i class="bi bi-star"></i>'.repeat(5 - product.rating)}
                        </div>
                        <p class="price-tag mb-4">${product.price}</p>
                        <p class="lead text-secondary mb-5">${product.description}</p>
                        
                        <div class="d-grid gap-3 d-md-flex">
                            <button class="btn btn-success btn-lg px-5 rounded-pill">Add to Cart</button>
                            <button class="btn btn-outline-dark btn-lg px-5 rounded-pill">Wishlist</button>
                        </div>
                    </div>
                `;
                document.title = `${product.name} | PBSSD Fresh`;
            } else {
                container.innerHTML = `<div class="col-12 text-center"><h2>Product not found</h2><a href="index.html">Return to home</a></div>`;
            }
        });
    </script>
</body>
</html>
