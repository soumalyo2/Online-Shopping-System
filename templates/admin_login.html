<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Security</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="admin-card animate-fade-in">
        <div class="text-center mb-4">
            <div class="security-icon mb-3">
                <i class="bi bi-shield-lock-fill"></i>
            </div>
            <h2 class="heading-lora">Security Portal</h2>
            <p class="text-secondary small">Authorization required for system access</p>
        </div>

        <form id="adminAuthForm">
            <div class="mb-4">
                <label class="form-label small fw-bold text-uppercase">Admin Key</label>
                <input type="password" id="adminKey" class="form-control custom-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-admin-sage w-100 py-3 mb-3">Verify Identity</button>
        </form>

        <div class="text-center">
            <a href="{{ url_for('index') }}" class="text-decoration-none small text-secondary">
                <i class="bi bi-shop me-1"></i> Return to Store
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="{{ url_for('static', filename='js/admin_login.js') }}"></script>
</body>
</html>
