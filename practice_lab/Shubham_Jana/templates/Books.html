{% extends "base.html" %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Abhi_style.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/Books.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/navbar.css') }}">
{% endblock %}

{% block body %}
    <div class="genre-tabs-container">
        <div class="genre-tabs">
            <button class="genre-tab active" onclick="scrollToGenre('hero')">Featured</button>
            <button class="genre-tab" onclick="scrollToGenre('horror')">Horror</button>
            <button class="genre-tab" onclick="scrollToGenre('autobiography')">Autobiography</button>
            <button class="genre-tab" onclick="scrollToGenre('drama')">Drama</button>
            <button class="genre-tab" onclick="scrollToGenre('sci-fi')">Sci-Fi</button>
            <button class="genre-tab" onclick="scrollToGenre('fantasy')">Fantasy</button>
            <button class="genre-tab" onclick="scrollToGenre('romance')">Romance</button>
            <button class="genre-tab" onclick="scrollToGenre('mystery')">Mystery</button>
            <button class="genre-tab" onclick="scrollToGenre('selfhelp')">Self-Help</button>
            <button class="genre-tab" onclick="scrollToGenre('history')">History</button>
            <button class="genre-tab" onclick="scrollToGenre('young-adult')">Young Adult</button>
            <button class="genre-tab" onclick="scrollToGenre('poetry')">Poetry</button>
            <button class="genre-tab" onclick="scrollToGenre('non-fiction')">Non-Fiction</button>
            <button class="genre-tab" onclick="scrollToGenre('classic')">Classics</button>
            <button class="genre-tab" onclick="scrollToGenre('manga')">Manga</button>
        </div>
    </div>

    <section class="hero-carousel" id="genre-hero">
        <div class="carousel-inner" id="hero-carousel-inner">
            </div>

        <button class="carousel-control prev" id="prevSlide"><i class="fas fa-chevron-left"></i></button>
        <button class="carousel-control next" id="nextSlide"><i class="fas fa-chevron-right"></i></button>

        <div class="carousel-nav" id="hero-carousel-nav">
            </div>

        <div class="carousel-progress-bar">
            <div id="carousel-progress-fill" class="progress-fill"></div>
        </div>
    </section>

    <main id="shop">
        <div id="dynamic-categories"></div>

        <section class="container" style="background: var(--book-warm-bg); border-top: 1px solid var(--border-color);">
            <div class="section-header">
                <div>
                    <span class="section-tagline">LITERARY MASTERS</span>
                    <h2>Author Spotlight</h2>
                </div>
            </div>
            <div id="author-spotlight-grid" class="author-spotlight-grid">
                </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/Books_Data.js') }}"></script>
    <script src="{{ url_for('static', filename='js/Books.js') }}" defer></script>
{% endblock %}
