<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask MySQL</title>
</head>
<body>
    <h2>Add a Name to MySQL</h2>
    <form action="/add" method="POST">
        <input type="text" name="username" placeholder="Enter a name" required>
        <button type="submit">Submit</button>
    </form>
    <h2>Name in Database: </h2>
        <ul>
            {% for user in users %}
            <li style="margin-bottom: 10px;">
                <span>{{ user[1] }}</span>
                
                <form action="/delete/{{ user[0] }}" method="POST" style="display: inline; margin-left: 10px;">
                    <button type="submit" onclick="return confirm('Are you sure you want to delete this user?');">Delete</button>
                </form>
            </li>
            {% endfor %}
        </ul>
</body>
</html>
