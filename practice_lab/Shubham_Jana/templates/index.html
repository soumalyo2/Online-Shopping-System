<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flask MySQL</title>
</head>
<body>
    <h2>Add a Name to MySQL</h2>
    <from action="/add" method="POST">
        <input type="text" name="username" placeholder="Enter a name" required>
        <button type="submit">Submit</button>
    </from>
    <h2>Name in Database: </h2>
    <ul>
        {% for user in users %}
        <li>{{ user[1] }}</li>{% endfor %}
    </ul>
</body>
</html>
