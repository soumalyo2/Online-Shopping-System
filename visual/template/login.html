<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Fresh Essentials</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../Css/login.css">
</head>
<body>
    <div class="split-container">
        <div class="side-image">
            <div class="overlay">
                <h1 class="display-4 fw-bold heading-lora">Pure Essentials.</h1>
                <p class="lead">Back to nature, back to basics.</p>
            </div>
        </div>

        <div class="side-form animate-fade-in">
            <div class="form-wrapper">
                <a href="../../index.html" class="back-link mb-5 d-inline-block">
                    <i class="bi bi-arrow-left"></i> Back to Store
                </a>
                <h2 class="heading-lora mb-2">Welcome Back</h2>
                <p class="text-secondary mb-5">Please enter your details to sign in.</p>

                <form id="userLoginForm">
                    <div class="form-floating-custom mb-4">
                        <input type="email" id="email" placeholder=" " required>
                        <label for="email">Email Address</label>
                    </div>
                    
                    <div class="form-floating-custom mb-4 position-relative">
                        <input type="password" id="password" placeholder=" " required>
                        <label for="password">Password</label>
                        <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
                    </div>

                    <button type="submit" class="btn btn-primary-nature w-100 mb-4">Sign In</button>
                </form>

                <div class="text-center">
                    <span class="text-secondary">New here?</span>
                    <a href="#" class="toggle-link ms-1">Create an account</a>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../Js/login.js"></script>
</body>
</html>
