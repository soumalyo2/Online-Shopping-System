<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Food Items | UrbanMart Food</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/Abhi_style.css">
    <link rel="stylesheet" href="../css/Food_AllProducts.css">
</head>
<body>

    <!-- Header Navigation -->
    <nav style="max-width:1400px; margin: 1.5rem auto; padding: 0 5%;">
        <a href="Food.html" class="back-btn-food">
            <i class="fas fa-arrow-left"></i>
            <span>Back to Food Store</span>
        </a>
    </nav>

    <!-- Filter & Sort Section -->
    <div class="filter-bar">
        <div class="filter-top-row">
            <div class="results-count">
                Showing <span id="results-count">0</span> delicious options
            </div>
            <!-- Custom Sort Dropdown -->
            <div class="custom-dropdown" id="sort-dropdown">
                <button class="dropdown-trigger" id="dropdown-trigger" type="button">
                    <i class="fas fa-sliders-h dropdown-icon"></i>
                    <span class="dropdown-label" id="dropdown-label">Sort: Featured</span>
                    <i class="fas fa-chevron-down dropdown-arrow"></i>
                </button>
                <div class="dropdown-menu" id="dropdown-menu">
                    <div class="dropdown-item active" data-value="featured">
                        <i class="fas fa-fire"></i>
                        <span>Featured</span>
                        <i class="fas fa-check dropdown-check"></i>
                    </div>
                    <div class="dropdown-item" data-value="price-low">
                        <i class="fas fa-arrow-up-short-wide"></i>
                        <span>Price: Low → High</span>
                        <i class="fas fa-check dropdown-check"></i>
                    </div>
                    <div class="dropdown-item" data-value="price-high">
                        <i class="fas fa-arrow-down-wide-short"></i>
                        <span>Price: High → Low</span>
                        <i class="fas fa-check dropdown-check"></i>
                    </div>
                    <div class="dropdown-item" data-value="rating">
                        <i class="fas fa-star"></i>
                        <span>Highest Rated</span>
                        <i class="fas fa-check dropdown-check"></i>
                    </div>
                </div>
            </div>
            <div class="dropdown-backdrop" id="dropdown-backdrop"></div>
        </div>
        
        <div class="filter-controls">
            <button class="filter-btn active" data-filter="all"><i class="fas fa-th-large"></i> All</button>
            <button class="filter-btn" data-filter="veg"><i class="fas fa-leaf" style="color: #27AE60;"></i> Pure Veg</button>
            <button class="filter-btn" data-filter="non-veg"><i class="fas fa-drumstick-bite" style="color: #E23744;"></i> Non-Veg</button>
            <button class="filter-btn" data-filter="sweets">Sweets</button>
            <button class="filter-btn" data-filter="spicy">Spicy</button>
            <button class="filter-btn" data-filter="pizza">Pizza</button>
            <button class="filter-btn" data-filter="burgers">Burgers</button>
            <button class="filter-btn" data-filter="chinese">Chinese</button>
            <button class="filter-btn" data-filter="healthy">Healthy</button>
            <button class="filter-btn" data-filter="desserts">Desserts</button>
        </div>
    </div>

    <!-- Products Grid -->
    <div class="products-grid-wrapper">
        <div class="products-grid" id="products-grid">
            <!-- Dynamically injected via Food_AllProducts.js -->
        </div>

        <!-- End of products -->
        <div class="load-more-section">
            <p>You've seen all delicious options! 🍔</p>
            <div class="products-end-mark"></div>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="back-to-top" title="Back to top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <!-- Footer -->
    <footer style="background: white; padding: 3rem 5%; border-top: 1px solid #EEE; text-align: center;">
        <h2 style="color: var(--food-red); font-weight: 800; margin-bottom: 1rem;">UrbanMart Food</h2>
        <p style="color: var(--food-text-muted); max-width: 600px; margin: 0 auto 2rem;">
            Delivering happiness to your doorstep. Every meal is prepared with love and hygiene.
        </p>
        <div style="font-size: 0.9rem; opacity: 0.6;">
            &copy; 2026 UrbanMart Food. All rights reserved.
        </div>
    </footer>

    <!-- Scripts -->
    <script src="../js/foodData.js"></script>
    <script src="../js/Food_AllProducts.js" defer></script>
</body>
</html>
